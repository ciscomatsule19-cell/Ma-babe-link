<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .joke-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .loading {
            font-size: 1.1rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:active {
            transform: translateY(0);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            min-width: 150px;
        }

        .btn-copy:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .joke-type {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            color: #27ae60;
            padding: 10px;
            background: #d5f4e6;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 20px;
            }

            .joke-box {
                padding: 20px;
                min-height: 100px;
            }

            .joke-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="joke-box" id="jokeBox">
            <p class="joke-text">Click the button to load a joke!</p>
        </div>

        <div id="errorMessage"></div>

        <div class="joke-type" id="jokeType"></div>

        <div class="btn-group">
            <button class="btn-next" onclick="getJoke()">Get New Joke</button>
            <button class="btn-copy" onclick="copyToClipboard()">Copy Joke</button>
        </div>

        <div id="successMessage"></div>
    </div>

    <script>
        let currentJoke = "";

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const errorMessage = document.getElementById('errorMessage');
            const jokeType = document.getElementById('jokeType');
            const successMessage = document.getElementById('successMessage');

            // Clear previous messages
            errorMessage.innerHTML = '';
            successMessage.innerHTML = '';

            // Show loading state
            jokeBox.innerHTML = '<p class="joke-text loading">⏳ Loading joke...</p>';
            jokeType.innerHTML = '';

            try {
                // Using Official Joke API - No authentication needed
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();
                
                // Format the joke
                currentJoke = `${data.setup}\n\n${data.punchline}`;
                
                // Display the joke
                jokeBox.innerHTML = `<p class="joke-text">${data.setup}<br><br><strong>${data.punchline}</strong></p>`;
                
                // Show joke type
                jokeType.innerHTML = `📌 Type: ${data.type}`;
                
            } catch (error) {
                console.error('Error:', error);
                jokeBox.innerHTML = '<p class="joke-text">😞 Oops! Could not load joke. Please try again.</p>';
                errorMessage.innerHTML = `<div class="error">⚠️ Error: ${error.message}</div>`;
            }
        }

        function copyToClipboard() {
            const successMessage = document.getElementById('successMessage');
            
            if (!currentJoke) {
                successMessage.innerHTML = '<div class="error">❌ No joke to copy! Get a joke first.</div>';
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                successMessage.innerHTML = '<div class="success">✅ Joke copied to clipboard!</div>';
                setTimeout(() => {
                    successMessage.innerHTML = '';
                }, 2000);
            }).catch(() => {
                successMessage.innerHTML = '<div class="error">❌ Failed to copy joke</div>';
            });
        }

        // Load a joke when page loads
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
